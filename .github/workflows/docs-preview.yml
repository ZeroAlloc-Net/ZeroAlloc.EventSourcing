name: Documentation Preview

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-preview.yml'
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies (monorepo)
        run: |
          cd /c/Projects/Prive/ZeroAlloc.Website
          pnpm install --frozen-lockfile

      - name: Build documentation
        run: |
          cd /c/Projects/Prive/ZeroAlloc.Website
          pnpm run build --filter=docs-eventsourcing

      - name: Deploy preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        id: deploy

      - name: Comment PR with preview URL
        uses: actions/github-script@v8
        with:
          script: |
            const deploymentUrl = steps.deploy.outputs.url;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📖 Documentation preview: [Preview](${deploymentUrl})`
            });
