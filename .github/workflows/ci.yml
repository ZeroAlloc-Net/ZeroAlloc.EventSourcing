name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    services:
      sql-server:
        image: mcr.microsoft.com/mssql/server:2025-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourPassword123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: 'ga'
      - name: Wait for databases to start
        run: sleep 15
      - name: Create test databases
        run: |
          # Create PostgreSQL test database
          docker exec $(docker ps -f name=postgres -q) psql -U postgres -c "CREATE DATABASE test;" || true
          # Create SQL Server test database (disable encryption due to self-signed certs in container)
          docker exec $(docker ps -f name=mssql -q) /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourPassword123! -N -C -Q "CREATE DATABASE test;" || true
      - name: Restore
        run: dotnet restore ZeroAlloc.EventSourcing.slnx
      - name: Build
        run: dotnet build ZeroAlloc.EventSourcing.slnx --no-restore --configuration Release
      - name: Test
        run: dotnet test ZeroAlloc.EventSourcing.slnx --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults --filter "FullyQualifiedName!~SqlServer&FullyQualifiedName!~PostgreSql"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/TestResults/*.trx"

  aot-smoke:
    name: aot-smoke
    runs-on: ubuntu-latest
    # Publishes samples/ZeroAlloc.EventSourcing.AotSmoke with PublishAot=true.
    # Exercises the generator + Aggregate<TId,TState> flow: Raise() + ApplyEvent()
    # + DequeueUncommitted. Doesn't require a database, keeping the smoke fast.
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: 'ga'
      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: Restore
        run: dotnet restore samples/ZeroAlloc.EventSourcing.AotSmoke/ZeroAlloc.EventSourcing.AotSmoke.csproj
      - name: Publish AOT
        run: dotnet publish samples/ZeroAlloc.EventSourcing.AotSmoke/ZeroAlloc.EventSourcing.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out
      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.EventSourcing.AotSmoke
