name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['9.0.x', '10.0.x']
    services:
      sql-server:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourPassword123!
          MSSQL_PID: Developer
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q 'SELECT 1' || exit 1"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10
          --health-start-period=60s
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
          dotnet-quality: 'ga'
      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            if sqlcmd -S localhost -U sa -P YourPassword123! -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 1
          done
          echo "SQL Server failed to start"
          exit 1
      - name: Restore
        run: dotnet restore ZeroAlloc.EventSourcing.slnx
      - name: Build
        run: dotnet build ZeroAlloc.EventSourcing.slnx --no-restore --configuration Release
      - name: Test
        run: dotnet test ZeroAlloc.EventSourcing.slnx --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet }}
          path: "**/TestResults/*.trx"
