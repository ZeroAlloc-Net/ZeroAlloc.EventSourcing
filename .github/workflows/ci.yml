name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    services:
      sql-server:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourPassword123!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: 'ga'
      - name: Wait for SQL Server
        run: sleep 15
      - name: Restore
        run: dotnet restore ZeroAlloc.EventSourcing.slnx
      - name: Build
        run: dotnet build ZeroAlloc.EventSourcing.slnx --no-restore --configuration Release
      - name: Test
        run: dotnet test ZeroAlloc.EventSourcing.slnx --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
