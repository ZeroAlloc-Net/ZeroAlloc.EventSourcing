name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['9.0.x', '10.0.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
          dotnet-quality: 'ga'
      - name: Restore
        run: dotnet restore ZeroAlloc.EventSourcing.slnx
      - name: Build
        run: dotnet build ZeroAlloc.EventSourcing.slnx --no-restore --configuration Release
      - name: Test
        run: dotnet test ZeroAlloc.EventSourcing.slnx --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet }}
          path: "**/TestResults/*.trx"
