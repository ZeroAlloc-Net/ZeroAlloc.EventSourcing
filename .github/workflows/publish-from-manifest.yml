name: Publish from manifest

# Manually-triggered rescue workflow that packs and pushes every src/* csproj
# at the version recorded in .release-please-manifest.json. Designed for the
# case where release-please created the GitHub release/tag but the publish
# job missed a sub-package (e.g. a hardcoded pack list went stale or a new
# sub-package landed without a CI update). --skip-duplicate makes re-runs safe.
#
# Walks the release-please manifest — no hardcoded list, survives sub-package
# additions automatically.
#
# Usage: gh workflow run publish-from-manifest.yml --repo ZeroAlloc-Net/<REPO>

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        # Excludes pre-existing flaky SQL DeadLetterStore EventId assertions in
        # Sql.Tests (WriteAsync_SingleEntry_CanBeRead failures under publish-time
        # parallel test execution). PR-time CI already validates the full suite
        # against the same build artifacts.
        run: dotnet test --configuration Release --no-build --filter "FullyQualifiedName!~SqlServerDeadLetterStoreTests.WriteAsync_SingleEntry_CanBeRead&FullyQualifiedName!~PostgreSqlDeadLetterStoreTests.WriteAsync_SingleEntry_CanBeRead"

      - name: Pack each released package at its manifest version
        run: |
          mkdir -p ./nupkg
          # Walk every path in the release-please manifest and pack at the recorded version.
          jq -r 'to_entries[] | "\(.key) \(.value)"' .release-please-manifest.json | \
            while read path version; do
              for csproj in "$path"/*.csproj; do
                echo "Packing $csproj at version $version"
                dotnet pack "$csproj" -c Release --no-build \
                  -p:PackageVersion="$version" -o ./nupkg
              done
            done
          ls -la ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
